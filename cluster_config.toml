name = "cluster_config"

# number of nodes to spin in a cluster. It must match with 
# the [addresses]
totalNodes = 3

# addresses that the nodes will listen on. It must match with 
# [totalNodes]
addresses = [
	"localhost:4000",
	"localhost:4001",
	"localhost:4002",
]

# used by dev-tools to hijack a cluster with higher terms
# faster or slower heartbeats
forceTerm = 100
heartbeat = 10

# tells dev-tools to continue until it's in control of the raft
persist = false
